const STATUS = {

  Declined:    { fg: 'var(--red-700)',    bg: 'var(--red-50)',     dot: 'var(--red-600)',    bd: '#f6c9c9' },
  Pending:     { fg: 'var(--orange-700)', bg: 'var(--orange-50)',  dot: 'var(--orange-500)', bd: '#ffd9a6' },
  Initialised: { fg: 'var(--neutral-700)',bg: 'var(--neutral-100)',dot: 'var(--neutral-500)',bd: 'var(--neutral-300)' },
  Cancelled:   { fg: 'var(--neutral-700)',bg: 'var(--neutral-100)',dot: 'var(--neutral-500)',bd: 'var(--neutral-300)' },
  Refunded:    { fg: 'var(--magenta-700)',bg: 'var(--magenta-50)', dot: 'var(--magenta-700)',bd: '#ffbfdc' },
  Reversed:    { fg: 'var(--magenta-700)',bg: 'var(--magenta-50)', dot: 'var(--magenta-700)',bd: '#ffbfdc' },

/* ============================================================
   ICONS — inline SVG, 24×24 grid, 2px stroke, rounded
   ============================================================ */
const PATHS = {

  check:   'M5 12.5l4.5 4.5L19 7',

  shield:  'M12 3l8 3v5c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-3Z',
  user:    'M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM4.5 20a7.5 7.5 0 0 1 15 0',
  search:  'M11 18a7 7 0 1 0 0-14 7 7 0 0 0 0 14ZM20 20l-4-4',
  filter:  'M3 5h18l-7 8v6l-4 2v-8L3 5Z',
  dots:    'M5 12h.01M12 12h.01M19 12h.01',

  card:    'M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7ZM3 10h18',

  doc:     'M7 3h7l4 4v14H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1ZM13 3v5h5',

function Icon({ name, size = 16, sw = 2, style, className }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
      className={className} style={{ flexShrink: 0, display: 'block', ...style }}>
      <path d={PATHS[name]} />
    </svg>
  );
}

/* ============================================================
   PRIMITIVES
   ============================================================ */
function StatusPill({ status, size = 'md' }) {
  const s = STATUS[status] || STATUS.Initialised;
  const pad = size === 'sm' ? '2px 8px' : '3px 10px 3px 8px';
  const fs = size === 'sm' ? 11 : 12;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6, padding: pad,
      borderRadius: 'var(--radius-full)', background: s.bg, color: s.fg,
      border: `1px solid ${s.bd}`, fontSize: fs, fontWeight: 700,
      lineHeight: 1.3, whiteSpace: 'nowrap', letterSpacing: 0.1,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: s.dot, flexShrink: 0 }} />
      {status}
    </span>
  );
}

function Chip({ children, icon, tone = 'neutral' }) {
  const tones = {
    neutral: { bg: 'var(--neutral-100)', fg: 'var(--neutral-800)', bd: 'var(--neutral-200)' },
    soft:    { bg: 'var(--neutral-50)',  fg: 'var(--neutral-700)', bd: 'var(--neutral-200)' },
  };
  const t = tones[tone] || tones.neutral;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5, padding: '2px 8px',
      borderRadius: 'var(--radius-sm)', background: t.bg, color: t.fg,
      border: `1px solid ${t.bd}`, fontSize: 12, fontWeight: 600, lineHeight: 1.4,
      fontFamily: 'var(--font-body)',
    }}>
      {icon && <Icon name={icon} size={12} sw={2.2} />}{children}
    </span>
  );
}

function KV({ label, children, mono, copy, accent }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 3, minWidth: 0 }}>
      <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 0.6, textTransform: 'uppercase', color: 'var(--neutral-500)' }}>{label}</span>
      <span style={{
        fontSize: 13, fontWeight: 600, color: accent || 'var(--neutral-900)',
        fontFamily: mono ? 'var(--font-mono)' : 'var(--font-body)',
        display: 'flex', alignItems: 'center', gap: 6, minWidth: 0,
      }}>
        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{children}</span>
        {copy && <Icon name="copy" size={12} style={{ color: 'var(--neutral-400)', flexShrink: 0, cursor: 'pointer' }} />}
      </span>
    </div>
  );
}

function Btn({ children, icon, iconColor, variant = 'default', size = 'md', onClick, disabled, title, full, busy }) {
  const h = size === 'lg' ? 40 : size === 'sm' ? 30 : 34;
  const variants = {
    primary: { bg: ADMIN.blue, fg: '#fff', bd: ADMIN.blue, hov: ADMIN.blueDeep },
    success: { bg: 'var(--green-500)', fg: '#fff', bd: 'var(--green-500)', hov: 'var(--green-600)' },
    danger:  { bg: 'var(--color-danger)', fg: '#fff', bd: 'var(--color-danger)', hov: 'var(--red-700)' },
    default: { bg: '#fff', fg: 'var(--neutral-800)', bd: 'var(--neutral-300)', hov: 'var(--neutral-50)' },
    ghost:   { bg: 'transparent', fg: 'var(--neutral-700)', bd: 'transparent', hov: 'var(--neutral-100)' },
  };
  const v = variants[variant] || variants.default;
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={disabled ? undefined : onClick} title={title} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        height: h, padding: size === 'sm' ? '0 10px' : '0 14px', width: full ? '100%' : 'auto',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 7,
        background: disabled ? 'var(--neutral-100)' : (hov ? v.hov : v.bg),
        color: disabled ? 'var(--neutral-400)' : v.fg,
        border: `1px solid ${disabled ? 'var(--neutral-200)' : v.bd}`,
        borderRadius: 'var(--radius-sm)', fontFamily: 'var(--font-sans)',
        fontSize: 13, fontWeight: 700, letterSpacing: 0.1,
        cursor: disabled ? 'not-allowed' : 'pointer', whiteSpace: 'nowrap',
        transition: 'background .14s, border-color .14s', flexShrink: 0,
      }}>
      {busy
        ? <span className="tx-spin" style={{ width: 14, height: 14, border: '2px solid currentColor', borderTopColor: 'transparent', borderRadius: '50%', display: 'inline-block' }} />
        : icon && <Icon name={icon} size={15} sw={2.1} style={iconColor && !disabled ? { color: iconColor } : undefined} />}
      {children}
    </button>
  );
}

   TRANSACTION DATA

/* ============================================================

const NAV = ['Players', 'Multiplayer', 'CMS', 'Finance', 'Gaming', 'CRM', 'Risk & Fraud', 'KYC', 'Staff Audit', 'Exp Platform', 'System', 'API Documentation'];

  { label: 'Stuck Payments', icon: 'alert' },

  { label: 'SSBT Management', icon: 'doc' },

];

function Card({ title, icon, right, children, pad = 16, style }) {

    <section style={{ background: '#fff', border: '1px solid var(--neutral-200)', borderRadius: 'var(--radius-md)', overflow: 'hidden', ...style }}>

        <header style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '12px 16px', borderBottom: '1px solid var(--neutral-100)' }}>

      <div style={{ padding: pad }}>{children}</div>

/* ============================================================
   FEATURES — Consistency Check, modals, decline reason
   ============================================================ */
function ConsistencyCheck({ layout = 'row', onOpenModal }) {
  const [state, setState] = React.useState('idle');
  const run = () => {
    setState('busy');
    setTimeout(() => { if (onOpenModal) { setState('idle'); onOpenModal(); } else setState('done'); }, 1100);
  };

  if (layout === 'button') {
    return (
      <Btn icon="sync" busy={state === 'busy'} size="sm" onClick={run}>
        {state === 'busy' ? 'Querying OKTO…' : 'Consistency Check'}
      </Btn>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <Btn icon="sync" busy={state === 'busy'} size="sm" onClick={run}>
          {state === 'busy' ? 'Querying OKTO…' : 'Check status with PSP'}
        </Btn>
        <span style={{ fontSize: 11.5, color: 'var(--neutral-500)' }}>Last checked 4 min ago</span>
      </div>
      {state === 'done' && (
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 12px', background: 'var(--green-50)', border: '1px solid #bce6cb', borderRadius: 'var(--radius-sm)' }}>
          <Icon name="check" size={16} style={{ color: 'var(--green-600)', marginTop: 1 }} />
          <div style={{ fontSize: 12.5, lineHeight: 1.5, color: 'var(--neutral-800)' }}>
            <strong style={{ color: 'var(--green-700)' }}>Consistent.</strong> OKTO reports <strong>APPROVED</strong> — matches the platform status.
          </div>
        </div>
      )}
    </div>
  );
}

function ConsistencyModal({ onClose }) {
  const rows = [

          </p>
        )) : e.reason ? (
          <p style={{ margin: '5px 0 0', fontSize: 12.5, color: linked ? 'var(--magenta-700)' : 'var(--neutral-600)', lineHeight: 1.45, display: 'flex', alignItems: 'center', gap: 6 }}>
            {linked && <Icon name="link" size={13} style={{ flexShrink: 0 }} />}{e.reason}
          </p>
        ) : null}

        {open && hasDetail && (
          <div style={{ marginTop: 8 }}>
            {hasDecSc
              ? <DeclineBannerInline sc={e._decSc} />
              : declined
                ? <DeclineReason entry={e} />
                : <><InfoRows desc={e.desc} /><div style={{ marginTop: 8 }}><ChecksList /></div></>}
          </div>
        )}

        {actions && <div style={{ marginTop: 10 }}>{actions}</div>}
      </div>
    </div>
  );
}

/* ============================================================
   DIRECTION D — Inline Actions
   No action buttons at the top; each lifecycle state carries
   the actions relevant at that point.
   ============================================================ */
function Segmented({ value, onChange, options }) {
  return (
    <div style={{ display: 'inline-flex', background: 'var(--neutral-100)', borderRadius: 'var(--radius-sm)', padding: 2, gap: 2 }}>
      {options.map((o) => {
        const v = (o && typeof o === 'object') ? o.value : o;
        const label = (o && typeof o === 'object') ? o.label : o;
        return (
          <button key={v} onClick={() => onChange(v)} style={{
            border: 'none', cursor: 'pointer', padding: '4px 10px', borderRadius: 3,
            fontFamily: 'var(--font-sans)', fontSize: 11.5, fontWeight: 700, textTransform: 'capitalize',
            background: value === v ? '#fff' : 'transparent',
            color: value === v ? 'var(--neutral-900)' : 'var(--neutral-500)',
            boxShadow: value === v ? 'var(--shadow-xs)' : 'none',
          }}>{label}</button>
        );
      })}
    </div>
  );
}

function ActionTray({ children, tone = 'neutral' }) {
  const bg = tone === 'warn' ? 'var(--orange-50)' : 'var(--neutral-50)';
  const bd = tone === 'warn' ? '#ffd9a6' : 'var(--neutral-200)';
  return (
    <div style={{ background: bg, border: `1px solid ${bd}`, borderRadius: 'var(--radius-sm)', padding: '10px 12px' }}>
      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 0.5, textTransform: 'uppercase', color: 'var(--neutral-500)', marginBottom: 8 }}>Available actions</div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>{children}</div>
    </div>
  );
}

  const switchScenario = (s) => { setScenario(s); setLinked([]); setModal(null); };

  const act = (a) => setToast({

  const onRefundConfirm = (m, data) => setLinked([{
    t: '14:31:09', status: 'Refunded', by: 'System', actor: 'Refund service',

    linked: 'a48f2325…RF1',
  }]);

  /* compute lifecycle for ap-manual example */
  let apLife = LIFE_AP_MANUAL_BASE;
  if (isApManual) {
    if (apScenario === 'autopayment') {
      apLife = LIFE_AP_AUTO;
    } else if (apAction === 'approved') {
      apLife = LIFE_AP_MANUAL_APPROVED;
    } else if (apAction === 'declined') {
      apLife = [
        { t: '09:58:10', status: 'Declined',    by: 'Agent',  actor: 'Radu Florea',  reason: apDeclineReason || 'Declined by agent', desc: "Payment declined by Radu Florea after Autopayment escalation.", info: [['Decision', 'Manual decline'], ['Agent', 'Radu Florea'], ['Reason', apDeclineReason || 'Declined by agent']] },
        { t: '09:58:03', status: 'Pending',     by: 'System', actor: 'Autopayment',  reason: 'Autopayment result was pending — payment needs manual review', desc: 'Autopayment could not make an automated decision. Payment was escalated to manual review.', info: [['Trigger', 'Autopayment escalation'], ['Queue', 'manual-review']] },
        { t: '09:58:01', status: 'Initialised', by: 'Player', actor: 'Player app',   reason: 'Checks passed', checks: true, desc: 'Player started the deposit. Pre-flight business checks ran at initiation.' },
      ];
    } else if (apAction === 'cancelled') {
      apLife = [
        { t: '09:58:10', status: 'Cancelled',   by: 'Agent',  actor: 'Radu Florea',  reason: 'Cancelled by payments agent', desc: "Payment cancelled by Radu Florea.", info: [['Agent', 'Radu Florea']] },
        { t: '09:58:03', status: 'Pending',     by: 'System', actor: 'Autopayment',  reason: 'Autopayment result was pending — payment needs manual review', desc: 'Autopayment could not make an automated decision. Payment was escalated to manual review.', info: [['Trigger', 'Autopayment escalation'], ['Queue', 'manual-review']] },
        { t: '09:58:01', status: 'Initialised', by: 'Player', actor: 'Player app',   reason: 'Checks passed', checks: true, desc: 'Player started the deposit. Pre-flight business checks ran at initiation.' },
      ];
    }
  }

  const base   = isAutoRefund ? LIFE_AUTO_REFUND
               : isStuck      ? LIFE_STUCK_WITHDRAWAL
               : isApManual   ? apLife
               : isDeclined   ? makeDeclinedLife(decSc)
               : scenario === 'approved' ? LIFE2 : LIFE2_PENDING;
  const life   = (isAutoRefund || isStuck || isApManual || isDeclined) ? base : [...linked, ...base];
  const status = isAutoRefund ? 'Refunded'
               : isStuck      ? 'Sent to PSP'
               : isDeclined   ? 'Declined'
               : isApManual   ? (apScenario === 'autopayment' ? 'Paid'
                                 : apAction === 'approved'   ? 'Paid'
                                 : apAction === 'declined'   ? 'Declined'
                                 : apAction === 'cancelled'  ? 'Cancelled'
                                 : 'Pending')
               : scenario === 'approved' ? 'Paid' : 'Pending';

  const trayFor = (e) => {
    if (isAutoRefund || isDeclined) return null;
    if (isStuck && e.status === 'Sent to PSP') {
      return (
        <ActionTray>
          <Btn size="sm" icon="sync" onClick={() => setCc(true)}>Consistency Check</Btn>
        </ActionTray>
      );
    }
    if (isApManual) {
      if (apScenario === 'manual' && apAction === null && e.current) {
        return (
          <ActionTray tone="warn">
            <Btn size="sm" icon="check" iconColor="var(--green-600)" onClick={() => setApAction('approved')}>Approve</Btn>
            <Btn size="sm" icon="ban"   iconColor="var(--red-600)"   onClick={() => setDeclineModal(true)}>Decline</Btn>
            <Btn size="sm" icon="trash"                              onClick={() => setApAction('cancelled')}>Cancel</Btn>
          </ActionTray>
        );
      }
      if (apScenario === 'manual' && apAction === 'approved' && e.status === 'Paid') {
        return (
          <ActionTray>
            <Btn size="sm" icon="refund" onClick={() => setModal('refund')}>Refund</Btn>
            <Btn size="sm" icon="sync"   onClick={() => setCc(true)}>Consistency Check</Btn>
          </ActionTray>
        );
      }
      return null;
    }
    if (scenario === 'pending' && e.current) {
      return (
        <ActionTray tone="warn">
          <Btn size="sm" icon="check" iconColor="var(--green-600)" onClick={() => act('approve')}>Approve</Btn>
          <Btn size="sm" icon="ban"   iconColor="var(--red-600)"   onClick={() => act('decline')}>Decline</Btn>
          <Btn size="sm" icon="trash"                              onClick={() => act('cancel')}>Cancel</Btn>
          <Btn size="sm" icon="retry"                              onClick={() => act('retry')}>Retry</Btn>
          <Btn size="sm" icon="ban"                                onClick={() => act('force')}>Force Cancel</Btn>
        </ActionTray>
      );
    }
    if (scenario === 'approved' && e.status === 'Paid' && !e.linked) {
      return (
        <ActionTray>
          <Btn size="sm" icon="refund" onClick={() => setModal('refund')}>Refund</Btn>
          <Btn size="sm" icon="sync"   onClick={() => setCc(true)}>Consistency Check</Btn>
        </ActionTray>
      );
    }
    return null;
  };

  /* narrative banner for ap-manual */
  const apBanner = !isApManual ? null
    : apScenario === 'autopayment' ? (
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: 'var(--green-50)', border: '1px solid #bce6cb', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-800)' }}>
        <Icon name="bolt" size={15} style={{ color: 'var(--green-600)', flexShrink: 0 }} />

      </div>
    ) : apAction === null ? (
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: '8px 12px', background: 'var(--orange-50)', border: '1px solid #ffd9a6', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-800)', lineHeight: 1.5 }}>
        <Icon name="alert" size={15} style={{ color: 'var(--orange-700)', flexShrink: 0, marginTop: 1 }} />
        <span>Autopayment could not process this payment automatically. <strong>Manual review required.</strong></span>
      </div>
    ) : apAction === 'approved' ? (
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: 'var(--green-50)', border: '1px solid #bce6cb', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-800)' }}>
        <Icon name="check" size={15} style={{ color: 'var(--green-600)', flexShrink: 0 }} />
        Manually approved by <strong style={{ marginLeft: 4 }}>Radu Florea</strong> — payment settled.
      </div>
    ) : apAction === 'declined' ? (
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: 'var(--red-50)', border: '1px solid #f6c9c9', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-800)' }}>
        <Icon name="ban" size={15} style={{ color: 'var(--red-600)', flexShrink: 0 }} />
        Declined by <strong style={{ margin: '0 4px' }}>Radu Florea</strong> — {apDeclineReason}
      </div>
    ) : (
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: 'var(--neutral-100)', border: '1px solid var(--neutral-200)', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-700)' }}>
        <Icon name="close" size={15} style={{ color: 'var(--neutral-500)', flexShrink: 0 }} />
        Cancelled by <strong style={{ marginLeft: 4 }}>Radu Florea</strong>.
      </div>
    );

  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--neutral-50)', fontFamily: 'var(--font-body)', position: 'relative' }}>
      <AdminHeader />
      <div style={{ flex: 1, display: 'flex', minHeight: 0, overflow: 'hidden' }}>
        <FinanceSidebar />
        <main style={{ flex: 1, minWidth: 0, padding: '14px 18px 18px 0', display: 'flex', flexDirection: 'column', gap: 12, overflowY: 'auto' }}>

          {/* command bar */}
          <div style={{ background: '#fff', border: '1px solid var(--neutral-200)', borderRadius: 'var(--radius-md)', padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 16 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 11.5, color: 'var(--neutral-500)', fontWeight: 600, marginBottom: 3 }}>
                {onBack
                  ? <button onClick={onBack} style={{ background: 'none', border: 'none', padding: 0, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11.5, fontWeight: 600, color: 'var(--blue-600)', fontFamily: 'var(--font-sans)' }}><Icon name="chevR" size={11} style={{ transform: 'rotate(180deg)' }} />Examples</button>
                  : <><span>Platform Transactions</span><Icon name="chevR" size={11} /><span style={{ color: 'var(--neutral-700)' }}>Detail</span></>}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, fontFamily: 'var(--font-sans)', letterSpacing: -0.2 }}>{txData.type} · {txData.currency} {txData.amount}</h1>
                <StatusPill status={status} />
                <span style={{ fontSize: 12, fontFamily: 'var(--font-mono)', color: 'var(--neutral-500)', display: 'flex', alignItems: 'center', gap: 6 }}>
                  {txData.idShort}<Icon name="copy" size={12} style={{ cursor: 'pointer' }} />
                </span>
              </div>
            </div>
            {!isAutoRefund && !isStuck && !isApManual && !isDeclined && (
              <div style={{ marginLeft: 'auto' }}>
                <Segmented value={scenario} onChange={switchScenario} options={['pending', 'approved']} />
              </div>
            )}
            {isApManual && (
              <div style={{ marginLeft: 'auto' }}>
                <Segmented value={apScenario} onChange={switchAp} options={['autopayment', 'manual']} />
              </div>
            )}
            {isDeclined && (
              <div style={{ marginLeft: 'auto' }}>
                <Segmented value={declinedKey} onChange={setDeclinedKey} options={DECLINED_SCENARIOS.map(function(s) { return { value: s.key, label: s.label }; })} />
              </div>
            )}
          </div>

          {/* summary strip */}
          <div style={{ background: '#fff', border: '1px solid var(--neutral-200)', borderRadius: 'var(--radius-md)', padding: '14px 16px', display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '16px 20px' }}>
            <KV label="Player ID"><span style={{ color: ADMIN.blueText }}>{txData.playerId}</span></KV>
            <KV label="Type">{txData.type}</KV>
            <KV label="Method"><Chip icon="bank">{txData.method}</Chip></KV>
            <KV label="Source">{txData.source}</KV>
            <KV label="Country"><Chip>{txData.country}</Chip></KV>
            <KV label="Created" mono>{txData.created.split(' ')[1]}</KV>
            <KV label="Updated" mono>{txData.updated.split(' ')[1]}</KV>
          </div>

          {/* 2-column body */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 12, minHeight: 0 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, minWidth: 0 }}>

              <Card title="Payment Information" icon="card" pad={16}>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '14px 18px' }}>
                  <KV label="Account / Card Name">{txData.playerName}</KV>
                  <KV label="Details" mono>{txData.details}</KV>
                  <KV label="External ID" mono copy>{txData.extId.slice(0, 18)}…</KV>
                </div>
              </Card>

              <Card title="Payment Lifecycle" icon="clock" pad={16}
                right={<span style={{ fontSize: 11, color: 'var(--neutral-500)', fontWeight: 600 }}>Actions are attached to each state</span>}>
                {isStuck ? (
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: '8px 12px', background: 'var(--blue-50)', border: '1px solid #b8dafc', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-800)', lineHeight: 1.5 }}>
                    <Icon name="clock" size={15} style={{ color: 'var(--blue-700)', flexShrink: 0, marginTop: 1 }} />
                    <span>Withdrawal sent to OKTO — <strong>no callback received</strong>. Platform status is frozen at Sent to PSP. Use Consistency Check to query OKTO directly.</span>
                  </div>
                ) : isAutoRefund ? (
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: '8px 12px', background: 'var(--magenta-50)', border: '1px solid #ffbfdc', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-800)', lineHeight: 1.5 }}>
                    <Icon name="info" size={15} style={{ color: 'var(--magenta-700)', flexShrink: 0, marginTop: 1 }} />
                    <span>PSP accepted and settled the deposit, but our system detected a <strong>daily deposit limit breach</strong> post-settlement. An automatic refund was triggered.</span>
                  </div>
                ) : isDeclined ? (
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: '8px 12px', background: 'var(--red-50)', border: '1px solid #f6c9c9', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-800)', lineHeight: 1.5 }}>
                    <Icon name="alert" size={15} style={{ color: 'var(--red-600)', flexShrink: 0, marginTop: 1 }} />
                    <span>{decSc.tldr}</span>
                  </div>
                ) : isApManual ? apBanner
                : scenario === 'approved' ? (
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: '8px 12px', background: 'var(--red-50)', border: '1px solid #f6c9c9', borderRadius: 'var(--radius-sm)', marginBottom: 16, fontSize: 12.5, color: 'var(--neutral-800)', lineHeight: 1.5 }}>
                    <Icon name="alert" size={15} style={{ color: 'var(--red-600)', flexShrink: 0, marginTop: 1 }} />
                    <span>Deposit declined by OKTO on the first attempt (<strong>DECLINE_NSF</strong> — insufficient funds). Player topped up and retried 17s later; payment settled successfully.</span>
                  </div>
                ) : null}
                {life.map((e, i) => (
                  <TimelineNode2 key={i} e={e} last={i === life.length - 1} actions={trayFor(e)} />
                ))}
              </Card>
            </div>

            {/* right rail */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <Card title="Risk · SEON" icon="shield" pad={14} right={<StatusPill status="Approved" size="sm" />}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
                  <div style={{ width: 48, height: 48, borderRadius: '50%', border: '4px solid var(--green-300)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 16, color: 'var(--neutral-900)', fontFamily: 'var(--font-sans)' }}>{txData.seon.score}</div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700 }}>Low risk score</div>
                    <div style={{ fontSize: 11.5, color: 'var(--neutral-500)' }}>State: {txData.seon.state}</div>
                  </div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {txData.seon.rules.map((r) => (
                    <div key={r} style={{ display: 'flex', gap: 7, fontSize: 11.5, color: 'var(--neutral-700)', lineHeight: 1.4 }}>
                      <Icon name="info" size={13} style={{ color: 'var(--orange-500)', flexShrink: 0, marginTop: 1 }} />{r}
                    </div>
                  ))}
                </div>
              </Card>

              {!isDeclined && (!isApManual || (apScenario === 'manual' && apAction === 'approved')) && (
                <Card title="Consistency Check" icon="sync" pad={14}>
                  <ConsistencyCheck layout="full" onOpenModal={() => setCc(true)} />
                </Card>
              )}
            </div>
          </div>
        </main>
      </div>

      {toast && (
        <div onClick={() => setToast(null)} style={{ position: 'fixed', bottom: 18, left: '50%', transform: 'translateX(-50%)', zIndex: 50, background: 'var(--neutral-900)', color: '#fff', padding: '10px 16px', borderRadius: 'var(--radius-md)', fontSize: 13, fontWeight: 600, boxShadow: 'var(--shadow-lg)', display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', whiteSpace: 'nowrap' }}>
          <Icon name="info" size={15} />{toast}<span style={{ opacity: .6, marginLeft: 6 }}>✕</span>
        </div>
      )}
      {modal && <ActionModal mode={modal} onClose={() => setModal(null)} onConfirm={onRefundConfirm} />}
      {cc && !isStuck && <ConsistencyModal onClose={() => setCc(false)} />}
      {cc && isStuck  && <ConsistencyModalMismatch onClose={() => setCc(false)} />}
      {declineModal   && <ManualDeclineModal onClose={() => setDeclineModal(false)} onConfirm={(r) => { setApDeclineReason(r); setApAction('declined'); setDeclineModal(false); }} />}
    </div>
  );
}

    desc: 'Four real decline scenarios: invalid account data, session timeout, bank-side rejection, and fraud rule block (salary account).',
    playerId: '—',
  },
];

function ExampleCard({ ex, onClick }) {
  const s = STATUS[ex.status] || STATUS.Initialised;
  const [hov, setHov] = React.useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: '#fff', border: `1px solid ${hov ? 'var(--neutral-300)' : 'var(--neutral-200)'}`,
        borderRadius: 'var(--radius-md)', padding: '16px 18px', cursor: 'pointer',
        boxShadow: hov ? 'var(--shadow-md)' : 'var(--shadow-xs)',
        transition: 'box-shadow .15s, border-color .15s',
        display: 'flex', flexDirection: 'column', gap: 10,
      }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <StatusPill status={ex.status} size="sm" />
        <Chip icon={ex.methodIcon}>{ex.method}</Chip>
        <span style={{ marginLeft: 'auto', fontSize: 16, fontWeight: 700, fontVariantNumeric: 'tabular-nums', fontFamily: 'var(--font-body)', color: 'var(--neutral-900)' }}>{ex.amount}</span>
      </div>
      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--neutral-500)', letterSpacing: 0.2 }}>{ex.type} · {ex.scenario}</div>
        <div style={{ marginTop: 4, fontSize: 12.5, color: 'var(--neutral-700)', lineHeight: 1.5 }}>{ex.desc}</div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, borderTop: '1px solid var(--neutral-100)', paddingTop: 10, fontSize: 11.5, color: 'var(--neutral-500)', fontWeight: 600 }}>
        <Icon name="user" size={13} />Player {ex.playerId}
        <Icon name="chevR" size={13} style={{ marginLeft: 'auto', color: 'var(--neutral-400)' }} />
      </div>
    </div>
  );
}

function HomePage({ onSelect }) {
  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--neutral-50)', fontFamily: 'var(--font-body)' }}>
      <AdminHeader />
      <div style={{ flex: 1, display: 'flex', minHeight: 0, overflow: 'hidden' }}>
        <FinanceSidebar />
        <main style={{ flex: 1, minWidth: 0, padding: '20px 24px 24px 0', overflowY: 'auto' }}>
          <div style={{ marginBottom: 20 }}>
            <h1 style={{ margin: '0 0 4px', fontSize: 20, fontWeight: 700, fontFamily: 'var(--font-sans)', letterSpacing: -0.3, color: 'var(--neutral-900)' }}>Transaction Examples</h1>
            <p style={{ margin: 0, fontSize: 13, color: 'var(--neutral-500)' }}>Direction D — Inline Actions prototype. Click a card to explore the transaction detail.</p>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 14 }}>
            {EXAMPLES.map((ex) => (
              <ExampleCard key={ex.id} ex={ex} onClick={() => onSelect(ex.id)} />
            ))}
          </div>
        </main>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage]             = React.useState('home');
  const [selectedId, setSelectedId] = React.useState(null);
  if (page === 'home') return <HomePage onSelect={(id) => { setSelectedId(id); setPage('detail'); }} />;
  return <DirectionD exampleId={selectedId} onBack={() => setPage('home')} />;
}

/* ── mount ── */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
